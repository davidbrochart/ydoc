name: Run Tests

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.10', '3.11', '3.12', '3.13', '3.14']
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pytest
        pip install -e .
    
    - name: Run tests
      run: |
        python -m pytest tests/ -v
        echo "All tests completed successfully!"

    - name: Check test coverage
      run: |
        python -m pytest tests/ --tb=short
        echo "Test coverage check completed!"

    - name: Run specific test files
      run: |
        python -m pytest tests/test_basic.py tests/test_types.py -v
        python -m pytest tests/test_awareness.py -v
        echo "Specific test files completed successfully!"

    - name: Test summary
      run: |
        echo "✅ All tests passed successfully!"
        echo "📊 Test coverage: $(python -m pytest tests/ --collect-only | grep "collected" | cut -d' ' -f2) tests"
        echo "🎯 Ready for deployment!"
